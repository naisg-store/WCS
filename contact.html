<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact - WoW Midnight Cheat Sheet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --surface: rgba(30, 41, 59, 0.5);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
        }

        body {
            margin: 0; padding: 40px 20px;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            background-attachment: fixed;
            color: var(--text-main); font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .container { width: 100%; max-width: 600px; flex-grow: 1; }
        .header { text-align: center; margin-bottom: 40px; margin-top: 20px; }
        h1 { margin: 0 0 10px 0; font-size: 2.8rem; font-weight: 800; letter-spacing: -1px; }

        .content-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 40px; backdrop-filter: blur(10px);
            text-align: center;
        }

        .contact-info { margin-top: 20px; font-size: 1.1rem; color: var(--text-muted); }
        .email-link { color: var(--accent); font-weight: 800; text-decoration: none; font-size: 1.3rem; }

        footer { width: 100%; max-width: 800px; text-align: center; padding-top: 20px; border-top: 1px solid var(--border); margin-top: 20px; }
        .footer-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; flex-wrap: wrap; }
        .footer-links a { color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: color 0.2s; }
        .footer-links a:hover { color: var(--accent); }
        .copyright { color: rgba(148, 163, 184, 0.5); font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Contact</h1>
        </div>

        <div class="content-box">
            <p>Have questions about the guide, found a bug in a rotation, or just want to talk shop about WoW systems engineering?</p>
            <div class="contact-info">
                Reach out at:<br><br>
                <a href="mailto:your-email@example.com" class="email-link">contact@mayteck.com</a>
            </div>
        </div>

        <footer>
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="privacy.html">Privacy Policy</a>
                <a href="tos.html">Terms of Service</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="copyright">
                &copy; <span id="dynamicYear"></span> Midnight Cheat Sheet. Built for the community.
            </div>
        </footer>
    </div>

    <script>
        document.getElementById('dynamicYear').textContent = new Date().getFullYear();
    </script>
</body>
</html>
